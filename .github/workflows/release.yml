name: Release

on:
  push:
    branches:
      - 'release-v*'

jobs:
  unix:
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    timeout-minutes: 45

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    env:
      DISPLAY: ":99.0"
      TOUCHFISH_TEXTS_IS_STABLE: 1
      TOUCHFISH_TEXTS_EXIT_ON_ERROR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true

      - name: Setup Python 3.11 (macOS, for node-gyp distutils)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -y update
          sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev libfontconfig-dev rpm

      - name: Install dependencies
        run: yarn install --check-files --frozen-lockfile

      - name: Strip ripgrep on Linux
        if: runner.os == 'Linux'
        run: strip node_modules/vscode-ripgrep/bin/rg

      - name: Lint
        run: |
          yarn run lint

      - name: Run unit and E2E tests
        uses: GabrielBB/xvfb-action@v1
        with:
          run: yarn run test

      - name: Build and release
        run: |
              if [ "$RUNNER_OS" == "Linux" ]; then
                yarn run release:linux --publish always
              elif [ "$RUNNER_OS" == "macOS" ]; then
                yarn run release:mac --publish always
              else
                echo "$RUNNER_OS not supported"
                exit 1
              fi

      - name: Calculate checksums
        if: runner.os == 'Linux'
        run: |
          sha256sum build/touchfish-texts-x64.tar.gz
          sha256sum build/touchfish-texts-x86_64.AppImage
          sha256sum build/touchfish-texts-*.deb
          sha256sum build/touchfish-texts-*.rpm
        shell: bash

      - name: Calculate checksums
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 build/touchfish-texts-arm64-mac.zip
          shasum -a 256 build/touchfish-texts-x64-mac.zip
          shasum -a 256 build/touchfish-texts-arm64.dmg
          shasum -a 256 build/touchfish-texts-x64.dmg
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: build/
          if-no-files-found: warn

  windows:
    runs-on: windows-latest
    continue-on-error: false
    timeout-minutes: 45

    env:
      TOUCHFISH_TEXTS_IS_STABLE: 1
      TOUCHFISH_TEXTS_EXIT_ON_ERROR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GYP_MSVS_VERSION: 2022
      npm_config_msvs_version: 2022

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true

      - name: Setup Python 3.11 (for node-gyp distutils)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Use --ignore-scripts to skip postinstall (which runs electron-rebuild).
        # We run postinstall manually below after upgrading node-gyp.
        run: yarn install --check-files --frozen-lockfile --ignore-scripts

      - name: Upgrade node-gyp and run postinstall
        # node-gyp@8.4.1 (locked in yarn.lock) has a VS2022 detection bug on windows-latest.
        # Replace it with the latest version before running electron-rebuild.
        run: |
          npm install --global node-gyp@latest
          $globalPrefix = npm prefix -g
          Remove-Item -Recurse -Force "node_modules\node-gyp"
          Copy-Item -Recurse -Force "$globalPrefix\node_modules\node-gyp" "node_modules\"
          node node_modules/electron/install.js
          node .electron-vue/postinstall.js
          yarn run rebuild
          yarn run lint:fix
        shell: pwsh

      - name: Lint
        run: |
          yarn run lint

      # - name: Run unit and E2E tests
      #   run: yarn run test

      - name: Build and release
        run: yarn run release:win --publish always

      - name: Calculate checksums
        run: |
          get-filehash -Algorithm SHA256 "build\touchfish-texts-setup.exe"
          get-filehash -Algorithm SHA256 "build\touchfish-texts-*-win.zip"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: build/
          if-no-files-found: warn
